<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #f7f5f0;
            --card: #ffffff;
            --navy: #1a2236;
            --gold: #b8964e;
            --gold-bg: #fdf6e8;
            --muted: #7a7d8a;
            --rule: #e4e0d8;
            --green: #2d6a4f;
            --error: #b94040;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: var(--card);
            border: 1px solid var(--rule);
            border-top: 4px solid var(--gold);
            padding: 90px;
            box-shadow: 0 60px 140px rgba(0, 0, 0, 0.12);
        }

        .monogram {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .monogram-line {
            flex: 1;
            height: 1px;
            background: var(--rule)
        }

        .monogram-text {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 6px;
            font-size: 13px;
            color: var(--gold);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 72px;
            line-height: 1.1;
            text-align: center;
            margin-bottom: 20px;
            color: var(--navy);
        }

        h1 em {
            color: var(--gold);
            font-style: italic
        }

        .subtitle {
            text-align: center;
            letter-spacing: 3px;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        .date-segments {
            display: grid;
            grid-template-columns: 1fr 1.6fr 1fr;
            gap: 30px;
            margin-bottom: 25px;
        }

        .date-segments select {
            appearance: none;
            padding: 20px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            text-align: center;
            border: 2px solid var(--rule);
            background: var(--gold-bg);
            cursor: pointer;
            transition: .3s;
        }

        .date-segments select:hover {
            border-color: var(--gold);
            background: #fff;
            box-shadow: 0 8px 30px rgba(184, 150, 78, .2);
        }

        #errorMsg {
            color: var(--error);
            text-align: center;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 20px;
            background: var(--navy);
            color: #fff;
            letter-spacing: 4px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 50px;
        }

        .btn:hover {
            background: #243050
        }

        .result {
            display: none
        }

        .result.show {
            display: block
        }

        .age-big {
            font-family: 'Cormorant Garamond', serif;
            font-size: 130px;
            text-align: center;
            color: var(--navy);
        }

        .age-exact {
            text-align: center;
            color: var(--muted);
            margin-bottom: 40px;
        }

        .breakdown {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .breakdown div {
            text-align: center
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-box {
            border: 1px solid var(--rule);
            padding: 25px;
            text-align: center;
        }

        .birthday {
            border-left: 4px solid var(--green);
            background: #f0f7f4;
            padding: 20px;
            color: var(--green);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--muted);
        }

        .footer a {
            text-decoration: none;
            color: var(--navy);
            font-weight: 500;
        }

        .footer a:hover {
            color: var(--gold)
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="monogram">
            <div class="monogram-line"></div>
            <div class="monogram-text">Age Calculator</div>
            <div class="monogram-line"></div>
        </div>

        <h1>Calculate<br>Your <em>Age</em></h1>
        <p class="subtitle">Select your date of birth below</p>

        <div class="date-segments">
            <select id="day"></select>

            <select id="month">
                <option value="">Month</option>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>

            <select id="year"></select>
        </div>

        <div id="errorMsg"></div>

        <button class="btn" onclick="calculate()">CALCULATE AGE</button>

        <div class="result" id="result">
            <div class="age-big" id="years">--</div>
            <div class="age-exact" id="exact"></div>

            <div class="breakdown">
                <div><strong id="bdYears"></strong><br>Years</div>
                <div><strong id="bdMonths"></strong><br>Months</div>
                <div><strong id="bdDays"></strong><br>Days</div>
            </div>

            <div class="stat-grid">
                <div class="stat-box"><strong id="totalDays"></strong><br>Total Days</div>
                <div class="stat-box"><strong id="totalWeeks"></strong><br>Total Weeks</div>
                <div class="stat-box"><strong id="totalHours"></strong><br>Total Hours</div>
                <div class="stat-box"><strong id="zodiac"></strong><br>Zodiac Sign</div>
            </div>

            <div class="birthday" id="birthdayText"></div>
        </div>

    </div>

    <div class="footer">
        Created by Chirag Parashar<br><br>
        <a href="https://www.linkedin.com/in/chiragparashar9665" target="_blank">LinkedIn</a>
    </div>

    <script>
        const daySel = document.getElementById("day");
        const yearSel = document.getElementById("year");
        const monthSel = document.getElementById("month");
        const errorBox = document.getElementById("errorMsg");
        const resultBox = document.getElementById("result");

        function isLeapYear(year) {
            return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        }

        function updateDays() {
            const m = parseInt(monthSel.value);
            const y = parseInt(yearSel.value);
            if (!m || !y) return;

            let days;
            if (m === 2) days = isLeapYear(y) ? 29 : 28;
            else if ([4, 6, 9, 11].includes(m)) days = 30;
            else days = 31;

            const current = daySel.value;
            daySel.innerHTML = "";
            for (let i = 1; i <= days; i++) {
                let opt = document.createElement("option");
                opt.value = i;
                opt.textContent = i;
                daySel.appendChild(opt);
            }
            if (current <= days) daySel.value = current;
        }

        for (let y = new Date().getFullYear(); y >= 1900; y--) {
            let opt = document.createElement("option");
            opt.value = y;
            opt.textContent = y;
            yearSel.appendChild(opt);
        }

        monthSel.addEventListener("change", updateDays);
        yearSel.addEventListener("change", updateDays);

        const today = new Date();
        yearSel.value = today.getFullYear();
        monthSel.value = today.getMonth() + 1;
        updateDays();
        daySel.value = today.getDate();

        function zodiacSign(m, d) {
            const z = [[1, 20, "Aquarius"], [2, 19, "Pisces"], [3, 21, "Aries"], [4, 20, "Taurus"],
            [5, 21, "Gemini"], [6, 21, "Cancer"], [7, 23, "Leo"], [8, 23, "Virgo"],
            [9, 23, "Libra"], [10, 23, "Scorpio"], [11, 22, "Sagittarius"], [12, 22, "Capricorn"]];
            for (let i = z.length - 1; i >= 0; i--) {
                if (m > z[i][0] || (m == z[i][0] && d >= z[i][1])) return z[i][2];
            }
            return "Capricorn";
        }

        function calculate() {
            errorBox.style.display = "none";
            errorBox.textContent = "";
            resultBox.classList.remove("show");

            const d = parseInt(daySel.value);
            const m = parseInt(monthSel.value);
            const y = parseInt(yearSel.value);

            if (!d || !m || !y) {
                errorBox.textContent = "Please select complete date.";
                errorBox.style.display = "block";
                return;
            }

            const dob = new Date(y, m - 1, d);
            const now = new Date();
            now.setHours(0, 0, 0, 0);

            if (dob > now) {
                errorBox.textContent = "Date of birth cannot be in the future.";
                errorBox.style.display = "block";
                return;
            }

            let years = now.getFullYear() - dob.getFullYear();
            let months = now.getMonth() - dob.getMonth();
            let days = now.getDate() - dob.getDate();

            if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }

            const totalDays = Math.floor((now - dob) / (1000 * 60 * 60 * 24));
            const totalWeeks = Math.floor(totalDays / 7);
            const totalHours = totalDays * 24;

            /* FIXED BIRTHDAY LOGIC */
            if (now.getDate() === dob.getDate() && now.getMonth() === dob.getMonth()) {
                document.getElementById("birthdayText").innerHTML =
                    "<strong>Happy Birthday!</strong> 🎉 Enjoy your special day!";
            }
            else {
                let next = new Date(now.getFullYear(), dob.getMonth(), dob.getDate());
                if (next < now) next.setFullYear(now.getFullYear() + 1);
                const daysLeft = Math.ceil((next - now) / (1000 * 60 * 60 * 24));
                document.getElementById("birthdayText").innerHTML =
                    `${daysLeft} days until your next birthday`;
            }

            document.getElementById("years").textContent = years;
            document.getElementById("exact").textContent = `${years} yrs ${months} months ${days} days`;
            document.getElementById("bdYears").textContent = years;
            document.getElementById("bdMonths").textContent = months;
            document.getElementById("bdDays").textContent = days;
            document.getElementById("totalDays").textContent = totalDays;
            document.getElementById("totalWeeks").textContent = totalWeeks;
            document.getElementById("totalHours").textContent = totalHours;
            document.getElementById("zodiac").textContent = zodiacSign(m, d);

            resultBox.classList.add("show");
        }
    </script>

</body>

</html>
